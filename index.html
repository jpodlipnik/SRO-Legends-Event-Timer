<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRO Legends Ultimate Tracker</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --highlight: #fbbf24;
            --danger: #ef4444;
            --success: #10b981;
            --input-bg: #334155;
            --border: #334155;
            --muted: #64748b;
            --badge-inactive: #94a3b8;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px 20px 100px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .clock-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            font-weight: 600;
        }

        .btn {
            background: var(--border);
            color: white;
            border: 1px solid var(--accent);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s, color 0.2s;
        }

        .btn:hover { background: var(--accent); color: var(--bg); }
        .btn.active { background: var(--accent); color: var(--bg); font-weight: bold; }
        .btn-add { background: var(--success); border-color: var(--success); font-weight: bold; }
        .btn-add:disabled { background: var(--muted); border-color: var(--muted); cursor: not-allowed; opacity: 0.5; }

        .btn-delete {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.2rem;
            position: absolute;
            right: 10px;
            top: 10px;
        }

        .btn-dead {
            background: none;
            border: none;
            color: var(--success);
            cursor: pointer;
            font-size: 1.2rem;
            position: absolute;
            right: 40px;
            top: 10px;
        }

        .manual-entry {
            background: var(--card);
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid var(--highlight);
        }

        .manual-entry h3 {
            margin: 0;
            text-align: center;
            color: var(--highlight);
        }

        .input-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
        }

        input, select {
            background: var(--input-bg);
            color: white;
            border: 1px solid #475569;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
        }

        input[type="number"] { width: 60px; -moz-appearance: textfield; appearance: textfield; outline: none; }
        input[type="number"].invalid { border-color: var(--danger); }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 20px auto;
        }

        .section-title {
            width: 100%;
            max-width: 1400px;
            margin: 50px auto 10px;
            border-left: 5px solid var(--accent);
            padding-left: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title.yellow { border-left-color: var(--highlight); }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            border-top: 4px solid var(--accent);
            position: relative;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }

        .card.manual-card { border-top-color: var(--highlight); }

        .card.active-alert {
            border-top-color: var(--danger);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70%  { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .inactive { opacity: 0.4; filter: grayscale(0.8); }

        .card h2 { margin: 0; color: var(--accent); font-size: 1.3rem; }

        .timer {
            font-size: 2.4rem;
            font-weight: bold;
            font-family: monospace;
            margin: 10px 0;
            color: #fff;
        }

        .info-table {
            width: 100%;
            border-top: 1px solid var(--border);
            margin-top: 10px;
            padding-top: 10px;
            font-size: 0.85rem;
        }

        .info-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .val { font-weight: bold; color: var(--highlight); }
        .local-val { color: var(--success); }
        .empty-state { grid-column: 1 / -1; text-align: center; color: var(--muted); }

        .boss-search {
            position: relative;
            width: 260px;
        }

        .boss-search input {
            width: 100%;
            text-align: left;
        }

        .boss-dropdown {
            display: none;
            position: absolute;
            left: 0;
            right: 0;
            max-height: 200px;
            overflow-y: auto;
            background: var(--card);
            border: 1px solid #475569;
            z-index: 10;
        }

        .boss-dropdown.open { display: block; }

        .boss-dropdown.drop-down {
            top: 100%;
            border-top: none;
            border-radius: 0 0 6px 6px;
        }

        .boss-dropdown.drop-up {
            bottom: 100%;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
        }

        .boss-option {
            padding: 8px 10px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .boss-option:hover,
        .boss-option.highlighted {
            background: var(--accent);
            color: var(--bg);
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Silkroad Legends Tracker</h1>
    <div class="clock-bar">
        <div>🌍 Your time: <span id="local-clock" style="color: var(--success)">--:--:--</span></div>
        <div>🏰 Server time (UTC+3): <span id="server-clock" style="color: var(--highlight)">--:--:--</span></div>
    </div>
</div>

<div class="section-title">
    <h2>Event Schedule</h2>
    <button class="btn" id="toggle-today" onclick="toggleTodayOnly()">Show All</button>
</div>
<div class="grid" id="event-grid"></div>

<div class="manual-entry">
    <h3>Add Custom Respawn</h3>
    <div class="input-group">
        <div class="boss-search" id="boss-search">
            <input type="text" id="boss-input" placeholder="Search boss..." aria-label="Search boss" autocomplete="off">
            <div class="boss-dropdown" id="boss-dropdown"></div>
        </div>
        <span>Killed ago:</span>
        <input type="number" id="killed-hours" placeholder="0" min="0" aria-label="Hours ago">h
        <input type="number" id="killed-minutes" placeholder="0" min="0" max="59" aria-label="Minutes ago">m
        <button class="btn btn-add" id="add-timer" onclick="addManualBoss()">+ Add Timer</button>
    </div>
</div>

<script src="events.js"></script>
<script src="bosses.js"></script>
<script>
    // --- Constants ---
    const MS_PER_SECOND = 1_000;
    const MS_PER_MINUTE = 60_000;
    const MS_PER_HOUR = 3_600_000;
    const SERVER_UTC_OFFSET = 3; // SRO Legends server is UTC+3
    const ALERT_THRESHOLD_MS = 10 * MS_PER_MINUTE;
    const STORAGE_KEY = 'sro_manual_timers';
    const MAX_DAYS_LOOKAHEAD = 8;

    // --- DOM references ---
    const dom = {
        localClock:    document.getElementById('local-clock'),
        serverClock:   document.getElementById('server-clock'),
        eventGrid:     document.getElementById('event-grid'),
        bossInput:     document.getElementById('boss-input'),
        bossDropdown:  document.getElementById('boss-dropdown'),
        killedHours:   document.getElementById('killed-hours'),
        killedMinutes: document.getElementById('killed-minutes'),
        addTimer:      document.getElementById('add-timer'),
        toggleToday:   document.getElementById('toggle-today'),
    };

    // --- State ---
    let todayOnly = false;
    let selectedBoss = null;
    let highlightedIndex = -1;
    let manualBosses = loadManualBosses();

    // --- localStorage helpers ---

    function loadManualBosses() {
        try {
            return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        } catch {
            return [];
        }
    }

    function saveManualBosses() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(manualBosses));
        } catch {
            // Storage full or unavailable — timers still work this session
        }
    }

    // --- Boss search ---

    function bossLabel(boss) {
        return `${boss.name} (${boss.respawnMinutes / 60}h)`;
    }

    function filterBosses(query) {
        const terms = query.toLowerCase().split(/\s+/).filter(Boolean);
        if (terms.length === 0) return BOSSES;
        return BOSSES.filter(boss => {
            const name = boss.name.toLowerCase();
            return terms.every(t => name.includes(t));
        });
    }

    function renderDropdown(matches) {
        highlightedIndex = -1;
        if (matches.length === 0) {
            dom.bossDropdown.innerHTML = '<div class="boss-option" style="color: var(--muted)">No matches</div>';
        } else {
            dom.bossDropdown.innerHTML = matches.map((boss, i) =>
                `<div class="boss-option" data-index="${BOSSES.indexOf(boss)}">${bossLabel(boss)}</div>`
            ).join('');
        }
        dom.bossDropdown.classList.add('open');
    }

    function selectBoss(boss) {
        selectedBoss = boss;
        dom.bossInput.value = bossLabel(boss);
        dom.bossDropdown.classList.remove('open');
        validateInputs();
    }

    function openDropdown() {
        const matches = filterBosses(dom.bossInput.value);
        renderDropdown(matches);

        const inputRect = dom.bossInput.getBoundingClientRect();
        const spaceBelow = window.innerHeight - inputRect.bottom;
        const dropUp = spaceBelow < 220;
        dom.bossDropdown.classList.toggle('drop-up', dropUp);
        dom.bossDropdown.classList.toggle('drop-down', !dropUp);
    }

    // --- Time helpers ---

    function formatCountdown(ms) {
        if (ms <= 0) return "SPAWNED!";
        const h = Math.floor(ms / MS_PER_HOUR);
        const m = Math.floor((ms % MS_PER_HOUR) / MS_PER_MINUTE);
        const s = Math.floor((ms % MS_PER_MINUTE) / MS_PER_SECOND);
        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function formatTime(hours, minutes) {
        return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
    }

    function serverDateToLocalDisplay(serverDate) {
        const now = new Date();
        const localMs = serverDate.getTime() - SERVER_UTC_OFFSET * MS_PER_HOUR - now.getTimezoneOffset() * MS_PER_MINUTE;
        const local = new Date(localMs);
        return formatTime(local.getHours(), local.getMinutes());
    }

    // --- Boss management ---

    function isValidInput(input) {
        if (input.value === '') return true;
        const num = Number(input.value);
        if (!Number.isInteger(num) || num < 0) return false;
        if (input.max && num > Number(input.max)) return false;
        return true;
    }

    function validateInputs() {
        let valid = selectedBoss !== null;
        for (const input of [dom.killedHours, dom.killedMinutes]) {
            const ok = isValidInput(input);
            input.classList.toggle('invalid', !ok);
            if (!ok) valid = false;
        }
        dom.addTimer.disabled = !valid;
        return valid;
    }

    function addManualBoss() {
        if (!validateInputs()) return;

        const spawnIntervalMs = selectedBoss.respawnMinutes * MS_PER_MINUTE;

        const h = parseInt(dom.killedHours.value) || 0;
        const m = parseInt(dom.killedMinutes.value) || 0;
        const killedAgoMs = h * MS_PER_HOUR + m * MS_PER_MINUTE;

        manualBosses.push({
            id: Date.now(),
            name: selectedBoss.name,
            targetTimestamp: Date.now() - killedAgoMs + spawnIntervalMs,
        });

        saveManualBosses();
        update();

        selectedBoss = null;
        dom.bossInput.value = '';
        dom.killedHours.value = '';
        dom.killedMinutes.value = '';
        validateInputs();
    }

    function removeManual(id) {
        manualBosses = manualBosses.filter(b => b.id !== id);
        saveManualBosses();
        update();
    }

    function markManualDead(id) {
        const boss = manualBosses.find(b => b.id === id);
        if (!boss) return;
        const bossConfig = BOSSES.find(b => b.name === boss.name);
        if (!bossConfig) return;
        boss.targetTimestamp = Date.now() + bossConfig.respawnMinutes * MS_PER_MINUTE;
        saveManualBosses();
        update();
    }

    function toggleTodayOnly() {
        todayOnly = !todayOnly;
        dom.toggleToday.classList.toggle('active', todayOnly);
        dom.toggleToday.textContent = todayOnly ? 'Today Only' : 'Show All';
        update();
    }

    // --- Find next occurrence of a scheduled event ---

    function findNextOccurrence(event, serverNow, utcMs) {
        for (let dayOffset = 0; dayOffset < MAX_DAYS_LOOKAHEAD; dayOffset++) {
            const checkDay = (serverNow.getDay() + dayOffset) % 7;
            if (!event.days.includes(checkDay)) continue;

            for (const timeStr of event.times) {
                const [h, m] = timeStr.split(':').map(Number);
                const candidate = new Date(utcMs + MS_PER_HOUR * SERVER_UTC_OFFSET);
                candidate.setDate(serverNow.getDate() + dayOffset);
                candidate.setHours(h, m, 0, 0);

                if (candidate > serverNow) {
                    return { nextDate: candidate, displayTimeServer: timeStr };
                }
            }
        }
        return null;
    }

    // --- Rendering ---

    function buildEventCards(serverNow, utcMs) {
        return EVENTS.map(event => {
            const result = findNextOccurrence(event, serverNow, utcMs);
            const diffMs = result ? result.nextDate - serverNow : Infinity;
            const displayTimeServer = result ? result.displayTimeServer : "--:--";
            const localDisplay = result ? serverDateToLocalDisplay(result.nextDate) : "--:--";
            const isToday = event.days.includes(serverNow.getDay());
            return { type: 'event', diffMs, name: event.name, isToday, displayTimeServer, localDisplay };
        });
    }

    function buildManualCards(now) {
        return manualBosses.map(boss => {
            const diffMs = boss.targetTimestamp - now.getTime();
            const spawnLocal = new Date(boss.targetTimestamp);
            const spawnServerMs = boss.targetTimestamp + now.getTimezoneOffset() * MS_PER_MINUTE + MS_PER_HOUR * SERVER_UTC_OFFSET;
            const spawnServer = new Date(spawnServerMs);
            return {
                type: 'manual', diffMs, name: boss.name, manualId: boss.id,
                displayTimeServer: formatTime(spawnServer.getHours(), spawnServer.getMinutes()),
                localDisplay: formatTime(spawnLocal.getHours(), spawnLocal.getMinutes()),
            };
        });
    }

    function renderCard(card) {
        const isSoon = card.diffMs > 0 && card.diffMs < ALERT_THRESHOLD_MS;

        if (card.type === 'manual') {
            const hasSpawned = card.diffMs <= 0;
            return `
                <div class="card manual-card ${isSoon ? 'active-alert' : ''}">
                    ${hasSpawned ? `<button class="btn-dead" onclick="markManualDead(${card.manualId})" aria-label="Mark ${card.name} as dead">💀</button>` : ''}
                    <button class="btn-delete" onclick="removeManual(${card.manualId})" aria-label="Remove ${card.name} timer">✖</button>
                    <span class="status-badge" style="color: var(--highlight)">● Manual Spawn</span>
                    <h2>${card.name}</h2>
                    <div class="timer">${formatCountdown(card.diffMs)}</div>
                    <div class="info-table">
                        <div class="info-row"><span>Server:</span><span class="val">${card.displayTimeServer}</span></div>
                        <div class="info-row"><span>Local:</span><span class="val local-val">${card.localDisplay}</span></div>
                    </div>
                </div>`;
        }

        return `
            <div class="card ${card.isToday ? '' : 'inactive'} ${isSoon ? 'active-alert' : ''}">
                <span class="status-badge" style="color: ${card.isToday ? 'var(--success)' : 'var(--badge-inactive)'}">
                    ${card.isToday ? '● Available' : '○ Not available today'}
                </span>
                <h2>${card.name}</h2>
                <div class="timer">${formatCountdown(card.diffMs)}</div>
                <div class="info-table">
                    <div class="info-row"><span>Server:</span><span class="val">${card.displayTimeServer}</span></div>
                    <div class="info-row"><span>Local:</span><span class="val local-val">${card.localDisplay}</span></div>
                </div>
            </div>`;
    }

    function renderGrid(serverNow, utcMs, now) {
        let cards = [...buildEventCards(serverNow, utcMs), ...buildManualCards(now)];
        if (todayOnly) {
            cards = cards.filter(c => c.type === 'manual' || c.isToday);
        }
        cards.sort((a, b) => a.diffMs - b.diffMs);
        dom.eventGrid.innerHTML = cards.map(renderCard).join('');
    }

    // --- Main update loop ---

    function update() {
        const now = new Date();
        const utcMs = now.getTime() + now.getTimezoneOffset() * MS_PER_MINUTE;
        const serverNow = new Date(utcMs + MS_PER_HOUR * SERVER_UTC_OFFSET);

        dom.localClock.textContent = now.toLocaleTimeString(undefined, { hour12: false });
        dom.serverClock.textContent = serverNow.toLocaleTimeString(undefined, { hour12: false });

        renderGrid(serverNow, utcMs, now);
    }

    // --- Input behavior ---
    for (const input of [dom.killedHours, dom.killedMinutes]) {
        input.addEventListener('input', () => validateInputs());
    }

    // --- Boss search behavior ---
    dom.bossInput.addEventListener('focus', openDropdown);
    dom.bossInput.addEventListener('input', () => {
        selectedBoss = null;
        openDropdown();
        validateInputs();
    });

    dom.bossDropdown.addEventListener('mousedown', e => {
        const option = e.target.closest('.boss-option');
        if (!option || option.dataset.index === undefined) return;
        selectBoss(BOSSES[Number(option.dataset.index)]);
    });

    dom.bossInput.addEventListener('keydown', e => {
        const items = dom.bossDropdown.querySelectorAll('.boss-option[data-index]');
        if (!items.length) return;

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            highlightedIndex = Math.min(highlightedIndex + 1, items.length - 1);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            highlightedIndex = Math.max(highlightedIndex - 1, 0);
        } else if (e.key === 'Enter' && highlightedIndex >= 0) {
            e.preventDefault();
            items[highlightedIndex].click();
            return;
        } else if (e.key === 'Escape') {
            dom.bossDropdown.classList.remove('open');
            return;
        } else {
            return;
        }

        items.forEach((el, i) => el.classList.toggle('highlighted', i === highlightedIndex));
        items[highlightedIndex].scrollIntoView({ block: 'nearest' });
    });

    document.addEventListener('click', e => {
        if (!e.target.closest('#boss-search')) {
            dom.bossDropdown.classList.remove('open');
        }
    });

    // --- Start ---
    validateInputs();
    setInterval(update, MS_PER_SECOND);
    update();
</script>
</body>
</html>
